<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 Cake Clicker – Wasm Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🍰 Cake Clicker 🍰</h1>
    <div class="score-board">
        Score: <span id="scoreValue">0</span>
    </div>
    <!-- for selecting  different icons-->

    <div class="icon-slider">
        <input type="range" id="iconSlider" min="0" max="4" step="1" value="0">
        <span id="sliderIcon">🍰</span>
    </div>

    <div class="click-area">
        <div id="cake">🍰</div>
    </div>
    <div class="upgrades">
        <button id="upgradeClick">Upgrade Click (+1) – Cost: 10 🍰</button>
        <button id="upgradePassive">Auto‑Baker (+0.5/s) – Cost: 50 🍰</button>
    </div>
    <div class="stats">
        Click Multiplier: <span id="multiplier">1</span>x<br>
        Passive Income: <span id="passive">0</span>/s
    </div>
    <button id="resetBtn">Reset Game</button>
</div>
<!-- <script src="CakeClicker.js"></script>  generated by Emscripten -->
<script src="main.js" type="module"></script>
</body>
</html>
